<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Важный вопрос</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #fdf6f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Floating background shapes */
    .bg-shape {
      position: fixed;
      border-radius: 50%;
      opacity: 0.08;
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
    }
    .bg-shape:nth-child(1) { width: 300px; height: 300px; background: #ff6b6b; top: -100px; left: -100px; animation-delay: 0s; }
    .bg-shape:nth-child(2) { width: 200px; height: 200px; background: #ffd93d; bottom: -50px; right: -50px; animation-delay: 2s; }
    .bg-shape:nth-child(3) { width: 150px; height: 150px; background: #6bcb77; top: 50%; right: 10%; animation-delay: 4s; }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(10deg); }
    }

    .card {
      background: white;
      border-radius: 32px;
      padding: 52px 48px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.04);
      position: relative;
      animation: cardIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(40px) scale(0.9); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .emoji {
      font-size: 64px;
      display: block;
      margin-bottom: 20px;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    h1 {
      font-size: 22px;
      font-weight: 900;
      color: #1a1a2e;
      line-height: 1.4;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 15px;
      color: #888;
      font-weight: 600;
      margin-bottom: 36px;
    }

    .buttons {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      position: relative;
      min-height: 56px;
    }

    .btn {
      padding: 16px 36px;
      border-radius: 16px;
      border: none;
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn-yes {
      background: #ff6b6b;
      color: white;
      box-shadow: 0 6px 20px rgba(255, 107, 107, 0.35);
    }

    .btn-yes:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 10px 28px rgba(255, 107, 107, 0.45);
    }

    .btn-yes:active {
      transform: scale(0.97);
    }

    .btn-no {
      background: #f0f0f0;
      color: #aaa;
      position: fixed;
      z-index: 1000;
      transition: none;
    }

    .hint {
      margin-top: 28px;
      font-size: 13px;
      color: #ccc;
      font-weight: 600;
      min-height: 20px;
      transition: opacity 0.3s;
    }

    /* Success state */
    .success-overlay {
      display: none;
      flex-direction: column;
      align-items: center;
    }

    .success-emoji {
      font-size: 72px;
      animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes pop {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .success-text {
      font-size: 24px;
      font-weight: 900;
      color: #1a1a2e;
      margin-top: 16px;
      margin-bottom: 8px;
    }

    .success-sub {
      font-size: 15px;
      color: #888;
      font-weight: 600;
    }

    .confetti {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 999;
    }

    .c-piece {
      position: absolute;
      width: 10px;
      height: 10px;
      opacity: 0;
      animation: confettiFall linear forwards;
    }

    @keyframes confettiFall {
      0% { opacity: 1; transform: translateY(-20px) rotate(0deg); }
      100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
    }
  </style>
</head>
<body>

  <div class="bg-shape"></div>
  <div class="bg-shape"></div>
  <div class="bg-shape"></div>

  <div class="confetti" id="confetti"></div>

  <div class="card" id="card">
    <div id="main-content">
      <span class="emoji">67</span>
      <h1>Важный вопрос</h1>
      <p class="subtitle">Требует честного ответа</p>

      <p style="font-size: 17px; font-weight: 700; color: #333; margin-bottom: 32px; line-height: 1.6;">
        После ОГЭ по математике<br>идём гулять?
      </p>

      <div class="buttons" id="buttons">
        <button class="btn btn-yes" id="yesBtn" onclick="handleYes()">Да 🎉</button>
      </div>
      <button class="btn btn-no" id="noBtn">Нет</button>

      <p class="hint" id="hint"></p>
    </div>

    <div class="success-overlay" id="success">
      
      <p class="success-text">Наконец-то, ты не главный воздухан</p>
      <p class="success-sub">Киндер яйцо осд не забуду 🥚</p>
    </div>
  </div>

  <script>
    let noCount = 0;
    const messages = [
      "Ошибка 404",
      "Что-то пошло не так",
      "Сайт не отвечает",
      "Соединение прервано",
      "Недопустимый запрос",
      "Сервер недоступен",
      "Ошибка 500",
      "Таймаут соединения",
      "Неизвестная ошибка",
      "Критический сбой",
    ];

    const btn = document.getElementById('noBtn');

    // Place "Нет" button below "Да" on load
    function initNoBtn() {
      const yesBtn = document.getElementById('yesBtn');
      const rect = yesBtn.getBoundingClientRect();
      btn.style.left = (rect.left + rect.width / 2) + 'px';
      btn.style.top = (rect.bottom + 16) + 'px';
      btn.style.transform = 'translateX(-50%)';
    }

    window.addEventListener('load', initNoBtn);

    function runAway() {
      noCount++;
      const hint = document.getElementById('hint');
      hint.textContent = messages[Math.min(noCount - 1, messages.length - 1)];

      const yesBtn = document.getElementById('yesBtn');
      const yesRect = yesBtn.getBoundingClientRect();
      const margin = 80;
      const btnW = 110, btnH = 60;

      let x, y, attempts = 0;
      while (true) {
        x = margin + Math.random() * (window.innerWidth - margin * 2);
        y = margin + Math.random() * (window.innerHeight - margin * 2);
        attempts++;
        const noL = x - btnW/2, noR = x + btnW/2, noT = y - btnH/2, noB = y + btnH/2;
        const yL = yesRect.left - 24, yR = yesRect.right + 24;
        const yT = yesRect.top - 24, yB = yesRect.bottom + 24;
        const overlaps = noR > yL && noL < yR && noB > yT && noT < yB;
        if (!overlaps || attempts > 30) break;
      }

      btn.style.left = x + 'px';
      btn.style.top = y + 'px';
      btn.style.transform = 'translate(-50%, -50%)';

      if (noCount >= 5) {
        const scale = Math.max(0.35, 1 - (noCount - 4) * 0.12);
        btn.style.fontSize = (16 * scale) + 'px';
        btn.style.padding = `${16 * scale}px ${36 * scale}px`;
      }

      if (noCount >= 10) {
        btn.style.display = 'none';
        hint.textContent = "Кнопка сломалась 🤷";
      }
    }

    // Proximity detection - run away before finger/cursor touches
    document.addEventListener('mousemove', (e) => {
      const r = btn.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      const dist = Math.hypot(e.clientX - cx, e.clientY - cy);
      if (dist < 60) runAway();
    });

    document.addEventListener('touchmove', (e) => {
      const touch = e.touches[0];
      const r = btn.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      const dist = Math.hypot(touch.clientX - cx, touch.clientY - cy);
      if (dist < 80) runAway();
    }, { passive: true });

    function handleYes() {
      document.getElementById('main-content').style.display = 'none';
      const success = document.getElementById('success');
      success.style.display = 'flex';
      launchConfetti();
    }

    function launchConfetti() {
      const colors = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff6bcd'];
      const container = document.getElementById('confetti');

      for (let i = 0; i < 80; i++) {
        setTimeout(() => {
          const piece = document.createElement('div');
          piece.className = 'c-piece';
          piece.style.left = Math.random() * 100 + 'vw';
          piece.style.top = '-10px';
          piece.style.background = colors[Math.floor(Math.random() * colors.length)];
          piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
          piece.style.animationDuration = (1.5 + Math.random() * 2) + 's';
          piece.style.animationDelay = '0s';
          container.appendChild(piece);
          setTimeout(() => piece.remove(), 4000);
        }, i * 30);
      }
    }
  </script>
</body>
</html>
